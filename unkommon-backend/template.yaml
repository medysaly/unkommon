AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Unkommon Backend - Serverless API for Contact Form

Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    Architectures:
      - x86_64

Parameters:
  SesFromEmail:
    Type: String
    Description: SES verified FROM email address
    Default: info@unkommon.ai

  SesToEmail:
    Type: String
    Description: SES TO email address (where leads go)
    Default: sales@unkommon.ai

Resources:
  # API Gateway
  UnkommonApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''GET,POST,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''

  # Contact Form Lambda Function
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: contact_form/
      Handler: app.lambda_handler
      Description: Contact form submission handler - sends email via SES
      Environment:
        Variables:
          SES_FROM_EMAIL: !Ref SesFromEmail
          SES_TO_EMAIL: !Ref SesToEmail
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        ContactApi:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/contact
            Method: POST
            
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: chatbot/
      Handler: app.lambda_handler
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - 'arn:aws:bedrock:*::foundation-model/*'
              - 'arn:aws:bedrock:*:*:inference-profile/*'
          - Effect: Allow
            Action:
              - aws-marketplace:ViewSubscriptions
              - aws-marketplace:Subscribe
            Resource: '*'
      Events:
        ChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/chat
            Method: POST           


Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${UnkommonApi}.execute-api.${AWS::Region}.amazonaws.com/Prod

  ContactFormEndpoint:
    Description: Contact Form API endpoint
    Value: !Sub https://${UnkommonApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/contact

  ContactFormFunctionArn:
    Description: Contact Form Lambda Function ARN
    Value: !GetAtt ContactFormFunction.Arn