AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Unkommon Backend - Serverless API for Contact Form

Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    Architectures:
      - x86_64

Parameters:
  SesFromEmail:
    Type: String
    Description: SES verified FROM email address
    Default: contact@unkommon.ai

  SesToEmail:
    Type: String
    Description: SES TO email address (where leads go)
    Default: sales@unkommon.ai

  AdminApiKey:
    Type: String
    Description: API key for admin endpoints (leads)
    NoEcho: true

  VapiWebhookSecret:
    Type: String
    Description: Secret token for Vapi webhook validation
    Default: ''
    NoEcho: true

Resources:
  # API Gateway
  UnkommonApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10
      Cors:
        AllowMethods: '''GET,POST,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''

  # DynamoDB Table for Conversations
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: unkommon-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: Unkommon

  # DynamoDB Table for Leads
  LeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: unkommon-leads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: leadId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: leadId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: createdAt
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Unkommon
        - Key: Environment
          Value: Production

      


  # Contact Form Lambda Function
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: contact_form/
      Handler: app.lambda_handler
      Description: Contact form submission handler - sends email via SES
      Environment:
        Variables:
          SES_FROM_EMAIL: !Ref SesFromEmail
          SES_TO_EMAIL: !Ref SesToEmail
          LEADS_TABLE_NAME: !Ref LeadsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        ContactApi:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/contact
            Method: POST

  # Chatbot Lambda Function
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: chatbot/
      Handler: app.lambda_handler
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          LEADS_TABLE_NAME: !Ref LeadsTable
          CONVERSATIONS_TABLE_NAME: !Ref ConversationsTable
          CALENDAR_API_URL: 'https://pqg65kdk63.execute-api.us-east-1.amazonaws.com/Prod/api/calendar'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - 'arn:aws:bedrock:*::foundation-model/anthropic.claude-*'
              - 'arn:aws:bedrock:*:*:inference-profile/anthropic.claude-*'
          - Effect: Allow
            Action:
              - aws-marketplace:ViewSubscriptions
              - aws-marketplace:Subscribe
            Resource: '*'
      Events:
        ChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/chat
            Method: POST


  # Leads API Lambda Function
  LeadsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: leads_api/
      Handler: app.lambda_handler
      Description: Leads API - returns all leads for dashboard
      Environment:
        Variables:
          LEADS_TABLE_NAME: !Ref LeadsTable
          ADMIN_API_KEY: !Ref AdminApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
      Events:
        GetLeads:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/leads
            Method: GET
        DeleteLeads:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/leads
            Method: DELETE

  # Vapi Webhook Function
  VapiWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: vapi_webhook/
      Handler: app.lambda_handler
      Environment:
        Variables:
          LEADS_TABLE_NAME: !Ref LeadsTable
          VAPI_WEBHOOK_SECRET: !Ref VapiWebhookSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        VapiWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/vapi-webhook
            Method: POST
  # Calendar API Function
  CalendarApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: calendar_api/
      Handler: app.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          GOOGLE_CALENDAR_SECRET: unkommon/google-calendar
          SES_FROM_EMAIL: !Ref SesFromEmail
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:unkommon/google-calendar*
          - Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: '*'
      Events:
        GetAvailability:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/calendar/availability
            Method: GET
        BookAppointment:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/calendar/book
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${UnkommonApi}.execute-api.${AWS::Region}.amazonaws.com/Prod

  ContactFormEndpoint:
    Description: Contact Form API endpoint
    Value: !Sub https://${UnkommonApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/contact

  ContactFormFunctionArn:
    Description: Contact Form Lambda Function ARN
    Value: !GetAtt ContactFormFunction.Arn

