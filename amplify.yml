version: 1
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-Frame-Options
        value: DENY
      - key: X-XSS-Protection
        value: '1; mode=block'
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://pqg65kdk63.execute-api.us-east-1.amazonaws.com https://vhjgbapchmfvlewv3s5wegcdva0vnqhe.lambda-url.us-east-1.on.aws https://api.vapi.ai wss://api.vapi.ai; frame-src https://cal.com; font-src 'self' https:; media-src 'self' https:; worker-src 'self' blob:"
      - key: Permissions-Policy
        value: "camera=(), microphone=(self), geolocation=(), payment=(), usb=()"
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend
