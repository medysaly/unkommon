AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Unkommon Backend - Chatbot + Calendar + Vapi Webhook

Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    Architectures:
      - x86_64

Parameters:
  LeadsNotificationEmail:
    Type: String
    Description: Email address that receives lead notifications (chatbot + vapi calls)
    Default: sales@unkommon.ai

  VapiWebhookSecret:
    Type: String
    Description: Secret token for Vapi webhook validation (REQUIRED)
    NoEcho: true

  ResendApiKey:
    Type: String
    Description: Resend API key for sending emails
    NoEcho: true

Resources:
  # API Gateway
  UnkommonApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10
      Cors:
        AllowMethods: '''GET,POST,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''

  # DynamoDB Table for Conversations
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: unkommon-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: Unkommon

  # Chatbot Lambda Function
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: chatbot/
      Handler: app.lambda_handler
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          CONVERSATIONS_TABLE_NAME: !Ref ConversationsTable
          LEADS_NOTIFICATION_EMAIL: !Ref LeadsNotificationEmail
          RESEND_API_KEY: !Ref ResendApiKey
          CALENDAR_API_URL: https://pqg65kdk63.execute-api.us-east-1.amazonaws.com/Prod/api/calendar
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-*'
              - 'arn:aws:bedrock:::foundation-model/anthropic.claude-*'
              - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*anthropic.claude-*'
      Events:
        ChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/chat
            Method: POST

  # Vapi Webhook Function
  VapiWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: vapi_webhook/
      Handler: app.lambda_handler
      Environment:
        Variables:
          VAPI_WEBHOOK_SECRET: !Ref VapiWebhookSecret
          RESEND_API_KEY: !Ref ResendApiKey
          LEADS_NOTIFICATION_EMAIL: !Ref LeadsNotificationEmail
          CALENDAR_API_URL: https://pqg65kdk63.execute-api.us-east-1.amazonaws.com/Prod/api/calendar
      Events:
        VapiWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/vapi-webhook
            Method: POST

  # Calendar API Function
  CalendarApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: calendar_api/
      Handler: app.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          GOOGLE_CALENDAR_SECRET: unkommon/google-calendar
          RESEND_API_KEY: !Ref ResendApiKey
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:unkommon/google-calendar*
      Events:
        GetAvailability:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/calendar/availability
            Method: GET
        BookAppointment:
          Type: Api
          Properties:
            RestApiId: !Ref UnkommonApi
            Path: /api/calendar/book
            Method: POST

  # WAF - Per-IP Rate Limiting
  ApiWafWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: unkommon-api-waf
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Description: Per-IP rate limiting for Unkommon API
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: UnkommonApiWaf
      Rules:
        - Name: PerIpRateLimit
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: PerIpRateLimit
        - Name: ChatbotRateLimit
          Priority: 2
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 30
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  SearchString: /api/chat
                  FieldToMatch:
                    UriPath: {}
                  TextTransformations:
                    - Priority: 0
                      Type: LOWERCASE
                  PositionalConstraint: CONTAINS
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ChatbotRateLimit

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${UnkommonApi}.execute-api.${AWS::Region}.amazonaws.com/Prod

  WafWebACLArn:
    Description: WAF WebACL ARN
    Value: !GetAtt ApiWafWebACL.Arn

  ApiStageArn:
    Description: API Gateway Stage ARN for WAF association
    Value: !Sub arn:aws:apigateway:${AWS::Region}::/restapis/${UnkommonApi}/stages/Prod
