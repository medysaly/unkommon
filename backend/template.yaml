AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Business Automated Backend - Serverless API with Cognito

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        AWS_SES_FROM_EMAIL: !Ref SesFromEmail
        AWS_SES_TO_EMAIL: !Ref SesToEmail

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL database connection string
    NoEcho: true

  SesFromEmail:
    Type: String
    Description: SES verified from email address
    Default: businessautomatedai@gmail.com

  SesToEmail:
    Type: String
    Description: SES notification recipient email
    Default: businessautomatedai@gmail.com

  CognitoUserPoolArn:
    Type: String
    Description: Cognito User Pool ARN for authorization

Resources:
  # API Gateway with Cognito Authorizer
  BusinessAutomatedApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn

  # Contact Form Lambda (Public)
  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/
      Handler: contact.handler
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: '*'
      Events:
        ContactApi:
          Type: Api
          Properties:
            RestApiId: !Ref BusinessAutomatedApi
            Path: /api/contact
            Method: POST

  # Get All Leads Lambda (Protected)
  GetAllLeadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/
      Handler: leads.getAllLeads
      Events:
        GetAllLeadsApi:
          Type: Api
          Properties:
            RestApiId: !Ref BusinessAutomatedApi
            Path: /api/leads
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # Get Lead By ID Lambda (Protected)
  GetLeadByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/
      Handler: leads.getLeadById
      Events:
        GetLeadByIdApi:
          Type: Api
          Properties:
            RestApiId: !Ref BusinessAutomatedApi
            Path: /api/leads/{id}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # Delete Lead Lambda (Protected)
  DeleteLeadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/
      Handler: leads.deleteLead
      Events:
        DeleteLeadApi:
          Type: Api
          Properties:
            RestApiId: !Ref BusinessAutomatedApi
            Path: /api/leads/{id}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

  # ===== CHATBOT RESOURCES =====

  # DynamoDB Table for Chatbot Conversations
  ChatbotConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chatbot_conversations
      BillingMode: PAY_PER_REQUEST  # No need to provision capacity - scales automatically
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S  # String
        - AttributeName: timestamp
          AttributeType: N  # Number
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH  # Partition key
        - AttributeName: timestamp
          KeyType: RANGE  # Sort key
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl  # Auto-delete old conversations after 30 days
      Tags:
        - Key: Service
          Value: Chatbot

  # Chatbot Lambda Function (Public)
  ChatbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/
      Handler: chatbot.handler
      Timeout: 30  # Bedrock can take 5-10 seconds for responses
      Environment:
        Variables:
          CHATBOT_TABLE_NAME: !Ref ChatbotConversationsTable
          BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotConversationsTable
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
          - Effect: Allow
            Action:
              - aws-marketplace:ViewSubscriptions
            Resource: '*'
        - Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: '*'
      Events:
        ChatbotApi:
          Type: Api
          Properties:
            RestApiId: !Ref BusinessAutomatedApi
            Path: /api/chat
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${BusinessAutomatedApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  ApiId:
    Description: API Gateway ID
    Value: !Ref BusinessAutomatedApi
